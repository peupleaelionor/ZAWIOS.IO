<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZAWIOS — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0C0D10;
      color: #eaeaf0;
      font-family: 'Sora', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; letter-spacing: -0.02em; }
    p { font-size: 14px; color: #a0a0b8; line-height: 1.6; max-width: 320px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #17D5CF; margin-bottom: 24px; }
    a { color: #17D5CF; text-decoration: none; margin-top: 20px; display: inline-block; font-size: 13px; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div>
    <div class="dot"></div>
    <h1>Hors ligne</h1>
    <p>Tu n'es pas connecté à internet. Vérifie ta connexion et réessaie.</p>
    <a href="/">Réessayer</a>
  </div>
</body>
</html>
