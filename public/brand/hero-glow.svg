<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1C39BB" stop-opacity="0.22"/>
      <stop offset="35%"  stop-color="#1C39BB" stop-opacity="0.10"/>
      <stop offset="70%"  stop-color="#3A86FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3A86FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-soft" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E6EBFF" stop-opacity="0.60"/>
      <stop offset="60%"  stop-color="#E6EBFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E6EBFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft base glow -->
  <ellipse cx="400" cy="300" rx="380" ry="280" fill="url(#glow-soft)"/>
  <!-- Royal blue glow -->
  <ellipse cx="400" cy="300" rx="260" ry="200" fill="url(#glow-center)"/>

  <!-- Subtle concentric arcs -->
  <g stroke="#1C39BB" stroke-opacity="0.06" stroke-width="0.8" fill="none">
    <ellipse cx="400" cy="300" rx="80"  ry="50"/>
    <ellipse cx="400" cy="300" rx="130" ry="80"/>
    <ellipse cx="400" cy="300" rx="185" ry="115"/>
    <ellipse cx="400" cy="300" rx="245" ry="150"/>
    <ellipse cx="400" cy="300" rx="310" ry="192"/>
  </g>

  <!-- Large centered bowtie mark -->
  <!-- Left wing: curves inward to center -->
  <path
    d="M400,300 C360,270 310,278 310,300 C310,322 360,330 400,300 Z"
    fill="#1C39BB"
    fill-opacity="0.22"
  />
  <!-- Right wing: mirrors left -->
  <path
    d="M400,300 C440,270 490,278 490,300 C490,322 440,330 400,300 Z"
    fill="#1C39BB"
    fill-opacity="0.22"
  />
  <!-- Inner highlight -->
  <path
    d="M400,300 C385,292 368,294 368,300 C368,306 385,308 400,300 Z"
    fill="#1C39BB"
    fill-opacity="0.35"
  />
  <path
    d="M400,300 C415,292 432,294 432,300 C432,306 415,308 400,300 Z"
    fill="#1C39BB"
    fill-opacity="0.35"
  />

  <!-- Center point -->
  <circle cx="400" cy="300" r="3" fill="#1C39BB" fill-opacity="0.55"/>
  <circle cx="400" cy="300" r="8" fill="#1C39BB" fill-opacity="0.12"/>

  <!-- Radiating short lines from bowtie ends -->
  <g stroke="#1C39BB" stroke-opacity="0.10" stroke-width="0.7">
    <line x1="310" y1="300" x2="265" y2="300"/>
    <line x1="310" y1="300" x2="275" y2="282"/>
    <line x1="310" y1="300" x2="275" y2="318"/>
    <line x1="490" y1="300" x2="535" y2="300"/>
    <line x1="490" y1="300" x2="525" y2="282"/>
    <line x1="490" y1="300" x2="525" y2="318"/>
  </g>
</svg>
