<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <radialGradient id="rose-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1C39BB" stop-opacity="0.18"/>
      <stop offset="35%"  stop-color="#3A86FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3A86FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft center glow -->
  <circle cx="400" cy="400" r="380" fill="url(#rose-center)"/>

  <!-- Outer ring -->
  <circle cx="400" cy="400" r="340" stroke="#1C39BB" stroke-opacity="0.14" stroke-width="0.8" fill="none"/>
  <circle cx="400" cy="400" r="300" stroke="#1C39BB" stroke-opacity="0.08" stroke-width="0.5" fill="none"/>

  <!-- Rose petals: lines radiating from center fanning into bowtie shape inside circle -->
  <!-- Left fan — lines going from center (400,400) to left half of outer ring -->
  <g stroke="#1C39BB" stroke-opacity="0.22" stroke-width="0.8" stroke-linecap="round" fill="none">
    <!-- Upper-left quadrant (going left) -->
    <path d="M400,400 C340,380 270,330 90,80"/>
    <path d="M400,400 C335,388 258,352 68,170"/>
    <path d="M400,400 C330,395 248,370 60,255"/>
    <path d="M400,400 C325,399 240,390 58,340"/>
    <path d="M400,400 C325,400 240,400 60,400"/>
    <path d="M400,400 C325,401 240,410 58,462"/>
    <path d="M400,400 C330,405 248,430 62,548"/>
    <path d="M400,400 C336,412 260,450 72,630"/>
    <path d="M400,400 C342,422 272,470 95,720"/>
  </g>

  <!-- Right fan — mirror -->
  <g stroke="#1C39BB" stroke-opacity="0.22" stroke-width="0.8" stroke-linecap="round" fill="none">
    <path d="M400,400 C460,380 530,330 710,80"/>
    <path d="M400,400 C465,388 542,352 732,170"/>
    <path d="M400,400 C470,395 552,370 740,255"/>
    <path d="M400,400 C475,399 560,390 742,340"/>
    <path d="M400,400 C475,400 560,400 740,400"/>
    <path d="M400,400 C475,401 560,410 742,462"/>
    <path d="M400,400 C470,405 552,430 738,548"/>
    <path d="M400,400 C464,412 540,450 728,630"/>
    <path d="M400,400 C458,422 528,470 705,720"/>
  </g>

  <!-- Inner loops (the spiral-like crossing curves that form the rose) -->
  <g stroke="#1C39BB" stroke-opacity="0.10" stroke-width="0.6" fill="none">
    <!-- Circular arcs that suggest the petal loops -->
    <path d="M400,400 C380,340 340,300 280,305 C220,310 190,360 200,410 C210,460 260,490 320,478"/>
    <path d="M400,400 C420,340 460,300 520,305 C580,310 610,360 600,410 C590,460 540,490 480,478"/>
    <path d="M400,400 C340,420 300,460 305,520 C310,580 360,610 410,600 C460,590 490,540 478,480"/>
    <path d="M400,400 C440,420 480,460 475,520 C470,580 420,605 375,595 C330,585 308,538 322,484"/>
  </g>

  <!-- Center dot -->
  <circle cx="400" cy="400" r="3" fill="#1C39BB" fill-opacity="0.55"/>
  <circle cx="400" cy="400" r="7" fill="#1C39BB" fill-opacity="0.08"/>
</svg>
