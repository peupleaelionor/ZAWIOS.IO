<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- ZAWIOS Mark (Convergence / Signal) — scalable, transparent -->
  <defs>
    <linearGradient id="zawiosCenterGlow" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17D5CF" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#17D5CF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#17D5CF" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Left wing (white) -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round">
    <path d="M8 18 L30 31"/>
    <path d="M8 22 L30 32"/>
    <path d="M8 26 L30 33"/>
    <path d="M8 30 L30 34"/>
    <path d="M8 34 L30 35"/>
    <path d="M8 38 L30 36"/>
    <path d="M8 42 L30 37"/>
    <path d="M8 46 L30 38"/>
  </g>

  <!-- Right wing (teal) -->
  <g stroke="#17D5CF" stroke-width="2" stroke-linecap="round">
    <path d="M56 18 L34 31"/>
    <path d="M56 22 L34 32"/>
    <path d="M56 26 L34 33"/>
    <path d="M56 30 L34 34"/>
    <path d="M56 34 L34 35"/>
    <path d="M56 38 L34 36"/>
    <path d="M56 42 L34 37"/>
    <path d="M56 46 L34 38"/>
  </g>

  <!-- Center convergence -->
  <circle cx="32" cy="34" r="2.2" fill="url(#zawiosCenterGlow)"/>
</svg>
