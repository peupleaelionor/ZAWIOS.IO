<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- ZAWIOS App Icon v2 — Globe Signal Convergence -->
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.5" stop-color="#0E1538"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <radialGradient id="icon-glow" cx="256" cy="256" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C39BB" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#6B8EF8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1C39BB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="icon-left" x1="80" y1="128" x2="256" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#CBD5E1" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="icon-right" x1="432" y1="128" x2="256" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8BA5F9"/>
      <stop offset="1" stop-color="#1C39BB"/>
    </linearGradient>
    <radialGradient id="icon-core" cx="256" cy="256" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="0.3" stop-color="#6B8EF8" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#1C39BB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#icon-bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#icon-glow)"/>

  <!-- Globe arcs (subtle grid) -->
  <g opacity="0.08" stroke="#FFFFFF" fill="none">
    <ellipse cx="256" cy="256" rx="160" ry="160" stroke-width="1.5"/>
    <ellipse cx="256" cy="256" rx="80" ry="160" stroke-width="1"/>
    <path d="M96 256 Q256 200 416 256" stroke-width="1"/>
    <path d="M96 256 Q256 312 416 256" stroke-width="1"/>
  </g>

  <!-- Left wing (white/silver) -->
  <g stroke="url(#icon-left)" stroke-width="12" stroke-linecap="round">
    <path d="M256 256 C224 244 192 216 152 164"/>
    <path d="M256 256 C220 250 184 232 132 196"/>
    <path d="M256 256 C220 254 180 248 116 232"/>
    <path d="M256 256 C220 256 176 256 108 256"/>
    <path d="M256 256 C220 258 180 264 116 280"/>
    <path d="M256 256 C220 262 184 280 132 316"/>
    <path d="M256 256 C224 268 192 296 152 348"/>
    <path d="M256 256 C240 276 224 308 204 360"/>
  </g>

  <!-- Right wing (Royal Blue gradient) -->
  <g stroke="url(#icon-right)" stroke-width="12" stroke-linecap="round">
    <path d="M256 256 C288 244 320 216 360 164"/>
    <path d="M256 256 C292 250 328 232 380 196"/>
    <path d="M256 256 C292 254 332 248 396 232"/>
    <path d="M256 256 C292 256 336 256 404 256"/>
    <path d="M256 256 C292 258 332 264 396 280"/>
    <path d="M256 256 C292 262 328 280 380 316"/>
    <path d="M256 256 C288 268 320 296 360 348"/>
    <path d="M256 256 C272 276 288 308 308 360"/>
  </g>

  <!-- Core convergence -->
  <circle cx="256" cy="256" r="32" fill="url(#icon-core)"/>
  <circle cx="256" cy="256" r="10" fill="#FFFFFF"/>
</svg>
