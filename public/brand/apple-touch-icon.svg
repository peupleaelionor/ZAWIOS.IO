  <line x1="90" y1="90" x2="166" y2="29"  stroke="#7c6ef0" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="166" y2="44"  stroke="#7c6ef0" stroke-width="2.2" stroke-linecap="round"/>
