<svg xmlns="http://www.w3.org/2000/svg" width="1456" height="816" viewBox="0 0 1456 816" fill="none">
  <defs>
    <path id="node" d="M0,0 C-9,-4 -18,-1.5 -18,0 C-18,1.5 -9,4 0,0 C9,-4 18,-1.5 18,0 C18,1.5 9,4 0,0 Z"/>
    <path id="node-sm" d="M0,0 C-5,-2.5 -10,-0.8 -10,0 C-10,0.8 -5,2.5 0,0 C5,-2.5 10,-0.8 10,0 C10,0.8 5,2.5 0,0 Z"/>
  </defs>

  <!-- Background connecting lines -->
  <g stroke="#1C39BB" stroke-opacity="0.04" stroke-width="0.6">
    <!-- Cluster 1 center: 290,430 -->
    <line x1="290" y1="430" x2="180" y2="520"/>
    <line x1="290" y1="430" x2="160" y2="340"/>
    <line x1="290" y1="430" x2="380" y2="490"/>
    <line x1="290" y1="430" x2="350" y2="320"/>
    <line x1="290" y1="430" x2="210" y2="390"/>
    <line x1="180" y1="520" x2="100" y2="580"/>
    <line x1="180" y1="520" x2="240" y2="600"/>
    <line x1="160" y1="340" x2="80"  y2="280"/>
    <line x1="160" y1="340" x2="220" y2="260"/>
    <line x1="380" y1="490" x2="460" y2="540"/>
    <line x1="350" y1="320" x2="440" y2="270"/>

    <!-- Cluster 2 center: 620,220 -->
    <line x1="620" y1="220" x2="510" y2="170"/>
    <line x1="620" y1="220" x2="540" y2="300"/>
    <line x1="620" y1="220" x2="700" y2="160"/>
    <line x1="620" y1="220" x2="720" y2="300"/>
    <line x1="510" y1="170" x2="430" y2="120"/>
    <line x1="700" y1="160" x2="790" y2="110"/>
    <line x1="720" y1="300" x2="800" y2="360"/>

    <!-- Cluster 3 center: 900,390 -->
    <line x1="900" y1="390" x2="820" y2="320"/>
    <line x1="900" y1="390" x2="830" y2="470"/>
    <line x1="900" y1="390" x2="990" y2="330"/>
    <line x1="900" y1="390" x2="980" y2="460"/>
    <line x1="820" y1="320" x2="730" y2="270"/>
    <line x1="990" y1="330" x2="1080" y2="280"/>
    <line x1="980" y1="460" x2="1060" y2="520"/>
    <line x1="830" y1="470" x2="760" y2="550"/>

    <!-- Cluster 4 center: 1180,560 -->
    <line x1="1180" y1="560" x2="1100" y2="490"/>
    <line x1="1180" y1="560" x2="1260" y2="490"/>
    <line x1="1180" y1="560" x2="1120" y2="640"/>
    <line x1="1180" y1="560" x2="1260" y2="640"/>
    <line x1="1100" y1="490" x2="1020" y2="430"/>
    <line x1="1260" y1="490" x2="1340" y2="430"/>
    <line x1="1260" y1="640" x2="1360" y2="680"/>
    <line x1="1120" y1="640" x2="1060" y2="700"/>

    <!-- Cross-cluster connections -->
    <line x1="290" y1="430" x2="620" y2="220" stroke-opacity="0.025"/>
    <line x1="620" y1="220" x2="900" y2="390" stroke-opacity="0.025"/>
    <line x1="900" y1="390" x2="1180" y2="560" stroke-opacity="0.025"/>
    <line x1="380" y1="490" x2="620" y2="220" stroke-opacity="0.02"/>
    <line x1="720" y1="300" x2="900" y2="390" stroke-opacity="0.02"/>
    <line x1="980" y1="460" x2="1180" y2="560" stroke-opacity="0.02"/>
  </g>

  <!-- Concentric circles around cluster centers -->
  <g stroke="#1C39BB" stroke-opacity="0.04" stroke-width="0.5" fill="none">
    <!-- Cluster 1 circles -->
    <circle cx="290" cy="430" r="60"/>
    <circle cx="290" cy="430" r="110"/>
    <circle cx="290" cy="430" r="165"/>
    <circle cx="290" cy="430" r="225"/>
    <!-- Cluster 2 circles -->
    <circle cx="620" cy="220" r="55"/>
    <circle cx="620" cy="220" r="105"/>
    <circle cx="620" cy="220" r="160"/>
    <circle cx="620" cy="220" r="220"/>
    <!-- Cluster 3 circles -->
    <circle cx="900" cy="390" r="65"/>
    <circle cx="900" cy="390" r="120"/>
    <circle cx="900" cy="390" r="180"/>
    <!-- Cluster 4 circles -->
    <circle cx="1180" cy="560" r="60"/>
    <circle cx="1180" cy="560" r="115"/>
    <circle cx="1180" cy="560" r="175"/>
    <circle cx="1180" cy="560" r="240"/>
  </g>

  <!-- Cluster nodes (bowties) -->
  <!-- Cluster 1 -->
  <use href="#node"    transform="translate(290,430)" fill="#1C39BB" fill-opacity="0.30"/>
  <use href="#node-sm" transform="translate(180,520)" fill="#1C39BB" fill-opacity="0.16"/>
  <use href="#node-sm" transform="translate(160,340)" fill="#1C39BB" fill-opacity="0.14"/>
  <use href="#node-sm" transform="translate(380,490)" fill="#1C39BB" fill-opacity="0.18"/>
  <use href="#node-sm" transform="translate(350,320)" fill="#1C39BB" fill-opacity="0.12"/>
  <use href="#node-sm" transform="translate(210,390)" fill="#1C39BB" fill-opacity="0.10"/>
  <use href="#node-sm" transform="translate(100,580)" fill="#1C39BB" fill-opacity="0.09"/>
  <use href="#node-sm" transform="translate(240,600)" fill="#1C39BB" fill-opacity="0.08"/>
  <use href="#node-sm" transform="translate(80,280)"  fill="#1C39BB" fill-opacity="0.07"/>
  <use href="#node-sm" transform="translate(220,260)" fill="#1C39BB" fill-opacity="0.10"/>
  <use href="#node-sm" transform="translate(460,540)" fill="#1C39BB" fill-opacity="0.09"/>
  <use href="#node-sm" transform="translate(440,270)" fill="#1C39BB" fill-opacity="0.11"/>

  <!-- Cluster 2 -->
  <use href="#node"    transform="translate(620,220)" fill="#1C39BB" fill-opacity="0.28"/>
  <use href="#node-sm" transform="translate(510,170)" fill="#1C39BB" fill-opacity="0.14"/>
  <use href="#node-sm" transform="translate(540,300)" fill="#1C39BB" fill-opacity="0.12"/>
  <use href="#node-sm" transform="translate(700,160)" fill="#1C39BB" fill-opacity="0.16"/>
  <use href="#node-sm" transform="translate(720,300)" fill="#1C39BB" fill-opacity="0.13"/>
  <use href="#node-sm" transform="translate(430,120)" fill="#1C39BB" fill-opacity="0.09"/>
  <use href="#node-sm" transform="translate(790,110)" fill="#1C39BB" fill-opacity="0.10"/>
  <use href="#node-sm" transform="translate(800,360)" fill="#1C39BB" fill-opacity="0.08"/>

  <!-- Cluster 3 -->
  <use href="#node"    transform="translate(900,390)" fill="#1C39BB" fill-opacity="0.32"/>
  <use href="#node-sm" transform="translate(820,320)" fill="#1C39BB" fill-opacity="0.15"/>
  <use href="#node-sm" transform="translate(830,470)" fill="#1C39BB" fill-opacity="0.13"/>
  <use href="#node-sm" transform="translate(990,330)" fill="#1C39BB" fill-opacity="0.17"/>
  <use href="#node-sm" transform="translate(980,460)" fill="#1C39BB" fill-opacity="0.14"/>
  <use href="#node-sm" transform="translate(730,270)" fill="#1C39BB" fill-opacity="0.09"/>
  <use href="#node-sm" transform="translate(1080,280)" fill="#1C39BB" fill-opacity="0.11"/>
  <use href="#node-sm" transform="translate(1060,520)" fill="#1C39BB" fill-opacity="0.10"/>
  <use href="#node-sm" transform="translate(760,550)"  fill="#1C39BB" fill-opacity="0.08"/>

  <!-- Cluster 4 -->
  <use href="#node"    transform="translate(1180,560)" fill="#1C39BB" fill-opacity="0.26"/>
  <use href="#node-sm" transform="translate(1100,490)" fill="#1C39BB" fill-opacity="0.14"/>
  <use href="#node-sm" transform="translate(1260,490)" fill="#1C39BB" fill-opacity="0.15"/>
  <use href="#node-sm" transform="translate(1120,640)" fill="#1C39BB" fill-opacity="0.12"/>
  <use href="#node-sm" transform="translate(1260,640)" fill="#1C39BB" fill-opacity="0.13"/>
  <use href="#node-sm" transform="translate(1020,430)" fill="#1C39BB" fill-opacity="0.09"/>
  <use href="#node-sm" transform="translate(1340,430)" fill="#1C39BB" fill-opacity="0.10"/>
  <use href="#node-sm" transform="translate(1360,680)" fill="#1C39BB" fill-opacity="0.08"/>
  <use href="#node-sm" transform="translate(1060,700)" fill="#1C39BB" fill-opacity="0.07"/>

  <!-- Outlier scattered dots -->
  <circle cx="50"  cy="140" r="1.5" fill="#1C39BB" fill-opacity="0.12"/>
  <circle cx="1400" cy="200" r="1.5" fill="#1C39BB" fill-opacity="0.10"/>
  <circle cx="700"  cy="700" r="1.5" fill="#1C39BB" fill-opacity="0.09"/>
  <circle cx="1300" cy="150" r="1"   fill="#1C39BB" fill-opacity="0.08"/>
  <circle cx="200"  cy="700" r="1"   fill="#1C39BB" fill-opacity="0.07"/>
</svg>
