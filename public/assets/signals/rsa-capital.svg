<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="coinLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1EC88A"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Big stack (left side) -->
  <rect x="120" y="100" width="160" height="40" rx="6" fill="url(#note)" fill-opacity="0.8"/>
  <rect x="125" y="145" width="160" height="40" rx="6" fill="url(#note)" fill-opacity="0.7"/>
  <rect x="118" y="190" width="160" height="40" rx="6" fill="url(#note)" fill-opacity="0.9"/>
  <rect x="122" y="235" width="160" height="40" rx="6" fill="url(#note)" fill-opacity="0.75"/>
  <rect x="116" y="280" width="160" height="40" rx="6" fill="url(#note)" fill-opacity="0.85"/>
  <!-- Big coins on top of stack -->
  <ellipse cx="200" cy="88" rx="35" ry="12" fill="url(#coin)"/>
  <ellipse cx="200" cy="83" rx="35" ry="12" fill="url(#coinLight)"/>
  <ellipse cx="200" cy="78" rx="35" ry="12" fill="url(#coin)"/>
  <ellipse cx="200" cy="73" rx="35" ry="12" fill="url(#coinLight)"/>
  <!-- Arrow pointing right (redistribution) -->
  <path d="M340 225 L420 225 L420 205 L460 230 L420 255 L420 235 L340 235 Z" fill="#1C39BB" fill-opacity="0.3"/>
  <!-- Many small stacks (right side) -->
  <ellipse cx="520" cy="290" rx="18" ry="7" fill="url(#coinLight)"/>
  <ellipse cx="520" cy="285" rx="18" ry="7" fill="url(#coin)"/>
  <ellipse cx="580" cy="310" rx="18" ry="7" fill="url(#coinLight)"/>
  <ellipse cx="580" cy="305" rx="18" ry="7" fill="url(#coin)"/>
  <ellipse cx="640" cy="280" rx="18" ry="7" fill="url(#coinLight)"/>
  <ellipse cx="640" cy="275" rx="18" ry="7" fill="url(#coin)"/>
  <ellipse cx="550" cy="220" rx="18" ry="7" fill="url(#coinLight)"/>
  <ellipse cx="550" cy="215" rx="18" ry="7" fill="url(#coin)"/>
  <ellipse cx="620" cy="230" rx="18" ry="7" fill="url(#coinLight)"/>
  <ellipse cx="620" cy="225" rx="18" ry="7" fill="url(#coin)"/>
  <ellipse cx="690" cy="300" rx="18" ry="7" fill="url(#coinLight)"/>
  <ellipse cx="690" cy="295" rx="18" ry="7" fill="url(#coin)"/>
  <!-- Small banknotes scattered -->
  <rect x="500" y="160" width="50" height="25" rx="3" fill="url(#note)" fill-opacity="0.5" transform="rotate(-10 525 172)"/>
  <rect x="630" y="170" width="50" height="25" rx="3" fill="url(#note)" fill-opacity="0.5" transform="rotate(5 655 182)"/>
  <rect x="560" y="140" width="50" height="25" rx="3" fill="url(#note)" fill-opacity="0.4" transform="rotate(-5 585 152)"/>
  <!-- Floor line -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#92400E" stroke-width="2" stroke-opacity="0.2"/>
</svg>
