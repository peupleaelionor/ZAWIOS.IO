  <circle cx="100" cy="380" r="35" fill="#0D9488" fill-opacity="0.05"/>
  <circle cx="700" cy="400" r="40" fill="#F472B6" fill-opacity="0.06"/>
  <!-- Ground suggestion -->
  <line x1="150" y1="370" x2="500" y2="370" stroke="#0D9488" stroke-width="1" stroke-opacity="0.1"/>
</svg>
