<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Sun/warmth circle -->
  <circle cx="650" cy="80" r="60" fill="#FBBF24" fill-opacity="0.3"/>
  <circle cx="650" cy="80" r="40" fill="#FBBF24" fill-opacity="0.2"/>
  <!-- Hourglass -->
  <path d="M340 70 L460 70 L460 85 L410 190 L460 295 L460 310 L340 310 L340 295 L390 190 L340 85 Z" fill="url(#glass)" fill-opacity="0.7"/>
  <path d="M355 85 L445 85 L405 175 Z" fill="url(#sand)" fill-opacity="0.5"/>
  <path d="M395 205 L445 295 L355 295 Z" fill="url(#sand)" fill-opacity="0.8"/>
  <!-- Sand particles falling -->
  <circle cx="400" cy="190" r="2" fill="#D97706"/>
  <circle cx="398" cy="198" r="1.5" fill="#D97706"/>
  <circle cx="402" cy="206" r="1.5" fill="#D97706"/>
  <!-- Frame of hourglass -->
  <rect x="330" y="65" width="140" height="10" rx="3" fill="#92400E"/>
  <rect x="330" y="305" width="140" height="10" rx="3" fill="#92400E"/>
  <!-- Person resting (right side) — simplified reclining figure -->
  <circle cx="600" cy="260" r="22" fill="#92400E" fill-opacity="0.5"/>
  <path d="M560 290 Q580 280 620 290 L650 320 Q630 340 580 340 L550 320 Z" fill="#92400E" fill-opacity="0.4" />
  <!-- Chair/bench shape -->
  <rect x="540" y="330" width="130" height="8" rx="4" fill="#92400E" fill-opacity="0.3"/>
  <rect x="545" y="338" width="8" height="30" rx="2" fill="#92400E" fill-opacity="0.3"/>
  <rect x="657" y="338" width="8" height="30" rx="2" fill="#92400E" fill-opacity="0.3"/>
  <!-- Clock (left side, small) -->
  <circle cx="170" cy="200" r="50" fill="#F8FAFC" fill-opacity="0.5"/>
  <circle cx="170" cy="200" r="45" fill="none" stroke="#92400E" stroke-width="3" stroke-opacity="0.4"/>
  <line x1="170" y1="200" x2="170" y2="168" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="200" x2="195" y2="210" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <circle cx="170" cy="200" r="4" fill="#D97706"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="380" r="4" fill="#92400E" fill-opacity="0.15"/>
  <circle cx="300" cy="400" r="6" fill="#92400E" fill-opacity="0.1"/>
  <circle cx="500" cy="410" r="5" fill="#92400E" fill-opacity="0.12"/>
</svg>
