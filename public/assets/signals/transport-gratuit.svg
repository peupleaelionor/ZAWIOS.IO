<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#1C39BB"/>
    </linearGradient>
    <linearGradient id="vehicle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A86FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3A86FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- City skyline background -->
  <rect x="50" y="160" width="60" height="290" fill="#F8FAFC" fill-opacity="0.08"/>
  <rect x="120" y="120" width="45" height="330" fill="#F8FAFC" fill-opacity="0.06"/>
  <rect x="175" y="180" width="50" height="270" fill="#F8FAFC" fill-opacity="0.07"/>
  <rect x="580" y="100" width="55" height="350" fill="#F8FAFC" fill-opacity="0.08"/>
  <rect x="645" y="150" width="40" height="300" fill="#F8FAFC" fill-opacity="0.06"/>
  <rect x="695" y="130" width="55" height="320" fill="#F8FAFC" fill-opacity="0.07"/>
  <rect x="760" y="170" width="40" height="280" fill="#F8FAFC" fill-opacity="0.05"/>
  <!-- Road/track -->
  <rect y="350" width="800" height="100" fill="#0D9488" fill-opacity="0.3"/>
  <line x1="0" y1="355" x2="800" y2="355" stroke="#F8FAFC" stroke-width="2" stroke-opacity="0.2"/>
  <!-- Bus -->
  <rect x="100" y="260" width="180" height="90" rx="12" fill="url(#vehicle)"/>
  <rect x="110" y="272" width="45" height="40" rx="4" fill="#3A86FF" fill-opacity="0.4"/>
  <rect x="165" y="272" width="45" height="40" rx="4" fill="#3A86FF" fill-opacity="0.4"/>
  <rect x="220" y="272" width="45" height="40" rx="4" fill="#3A86FF" fill-opacity="0.4"/>
  <circle cx="140" cy="360" r="16" fill="#475569"/>
  <circle cx="140" cy="360" r="8" fill="#CBD5E1"/>
  <circle cx="240" cy="360" r="16" fill="#475569"/>
  <circle cx="240" cy="360" r="8" fill="#CBD5E1"/>
  <!-- Train -->
  <rect x="400" y="240" width="250" height="70" rx="8" fill="url(#vehicle)"/>
  <rect x="395" y="240" width="30" height="70" rx="8" fill="#1EC88A" fill-opacity="0.6"/>
  <rect x="440" y="252" width="30" height="35" rx="4" fill="#3A86FF" fill-opacity="0.3"/>
  <rect x="480" y="252" width="30" height="35" rx="4" fill="#3A86FF" fill-opacity="0.3"/>
  <rect x="520" y="252" width="30" height="35" rx="4" fill="#3A86FF" fill-opacity="0.3"/>
  <rect x="560" y="252" width="30" height="35" rx="4" fill="#3A86FF" fill-opacity="0.3"/>
  <rect x="600" y="252" width="30" height="35" rx="4" fill="#3A86FF" fill-opacity="0.3"/>
  <circle cx="430" cy="320" r="12" fill="#475569"/>
  <circle cx="430" cy="320" r="6" fill="#CBD5E1"/>
  <circle cx="530" cy="320" r="12" fill="#475569"/>
  <circle cx="530" cy="320" r="6" fill="#CBD5E1"/>
  <circle cx="620" cy="320" r="12" fill="#475569"/>
  <circle cx="620" cy="320" r="6" fill="#CBD5E1"/>
  <!-- Track rails -->
  <line x1="380" y1="340" x2="680" y2="340" stroke="#F8FAFC" stroke-width="3" stroke-opacity="0.15"/>
  <line x1="380" y1="345" x2="680" y2="345" stroke="#F8FAFC" stroke-width="3" stroke-opacity="0.15"/>
  <!-- Metro M symbol (circle) -->
  <circle cx="400" cy="120" r="40" fill="none" stroke="#F8FAFC" stroke-width="3" stroke-opacity="0.25"/>
  <circle cx="400" cy="120" r="35" fill="#1EC88A" fill-opacity="0.15"/>
  <!-- Decorative motion lines -->
  <line x1="60" y1="290" x2="90" y2="290" stroke="#F8FAFC" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="50" y1="300" x2="85" y2="300" stroke="#F8FAFC" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="55" y1="310" x2="80" y2="310" stroke="#F8FAFC" stroke-width="2" stroke-opacity="0.1"/>
</svg>
