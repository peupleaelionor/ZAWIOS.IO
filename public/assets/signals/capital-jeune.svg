<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C39BB"/>
      <stop offset="100%" stop-color="#3A86FF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Stars background -->
  <circle cx="100" cy="60" r="2" fill="#F8FAFC" fill-opacity="0.3"/>
  <circle cx="250" cy="40" r="1.5" fill="#F8FAFC" fill-opacity="0.25"/>
  <circle cx="500" cy="50" r="2" fill="#F8FAFC" fill-opacity="0.2"/>
  <circle cx="680" cy="30" r="1.5" fill="#F8FAFC" fill-opacity="0.3"/>
  <circle cx="750" cy="80" r="2" fill="#F8FAFC" fill-opacity="0.2"/>
  <circle cx="350" cy="70" r="1" fill="#F8FAFC" fill-opacity="0.25"/>
  <!-- Graduation cap -->
  <polygon points="200,180 280,150 360,180 280,210" fill="#1E293B" fill-opacity="0.7"/>
  <rect x="270" y="140" width="20" height="15" rx="2" fill="#1E293B" fill-opacity="0.7"/>
  <line x1="360" y1="180" x2="370" y2="220" stroke="#D97706" stroke-width="2"/>
  <circle cx="370" cy="224" r="5" fill="url(#gold)"/>
  <!-- Coins (center) -->
  <ellipse cx="400" cy="320" rx="40" ry="14" fill="url(#gold)" fill-opacity="0.6"/>
  <ellipse cx="400" cy="310" rx="40" ry="14" fill="url(#gold)" fill-opacity="0.7"/>
  <ellipse cx="400" cy="300" rx="40" ry="14" fill="url(#gold)" fill-opacity="0.8"/>
  <ellipse cx="400" cy="290" rx="40" ry="14" fill="url(#gold)" fill-opacity="0.9"/>
  <ellipse cx="400" cy="280" rx="40" ry="14" fill="url(#gold)"/>
  <!-- More coins -->
  <ellipse cx="330" cy="340" rx="30" ry="11" fill="url(#gold)" fill-opacity="0.5"/>
  <ellipse cx="330" cy="333" rx="30" ry="11" fill="url(#gold)" fill-opacity="0.6"/>
  <ellipse cx="330" cy="326" rx="30" ry="11" fill="url(#gold)" fill-opacity="0.7"/>
  <ellipse cx="470" cy="335" rx="30" ry="11" fill="url(#gold)" fill-opacity="0.5"/>
  <ellipse cx="470" cy="328" rx="30" ry="11" fill="url(#gold)" fill-opacity="0.6"/>
  <!-- Rocket (right side) -->
  <path d="M620 280 L650 120 L680 280 Z" fill="url(#rocket)" fill-opacity="0.8"/>
  <circle cx="650" cy="200" r="12" fill="#3A86FF" fill-opacity="0.5"/>
  <!-- Rocket fins -->
  <path d="M620 280 L600 310 L625 280 Z" fill="#DC2626" fill-opacity="0.5"/>
  <path d="M680 280 L700 310 L675 280 Z" fill="#DC2626" fill-opacity="0.5"/>
  <!-- Rocket flame -->
  <path d="M630 280 Q650 330 670 280" fill="#FBBF24" fill-opacity="0.7"/>
  <path d="M638 280 Q650 315 662 280" fill="#F97316" fill-opacity="0.6"/>
  <!-- Upward arrow motif -->
  <path d="M150 350 L150 290 L130 290 L160 260 L190 290 L170 290 L170 350 Z" fill="#1EC88A" fill-opacity="0.3"/>
</svg>
